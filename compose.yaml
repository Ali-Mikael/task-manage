services:

  frontend:
    build:
      context: ./frontend
      args:
        - VITE_API_URL=http://localhost:5000/api
    # Sync system clock to match host
    volumes:
      - /etc/localtime:/etc/localtime:ro
    ports:
      - "80:80"

  backend:
    depends_on:
      - db
    build:
      context: ./backend
    env_file:
      - ./backend/.env
    volumes:
      - /etc/localtime:/etc/localtime:ro
    ports:
      - "5000:5000"

  db:
    image: postgres:alpine
    volumes:
      - /etc/localtime:/etc/localtime:ro
    env_file:
      - db.env
    ports:
      - "5432:5432"
