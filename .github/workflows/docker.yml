name: Publish Docker image

on:
  release:
    types: [published]

jobs:
  push_to_registry:
    name: Push Docker Image to Docker Hub
    runs-on: ubuntu-latest
    matrix:
      image: [task-manage-backend, task-manage-frontend]
      dockerfile: [../../backend/Dockerfile, ../../frontend/Dockerfile]
    permissions:
      packages: write
      contents: read
      attestations: write
      id-token: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      # LOGIN IN TO DOCKER
      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # EXTRACT METADATA
      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ secrets.DOCKER_USERNAME }}/${{ matrix.image }}

      # BUILD AND PUSH
      - name: Build and push Docker image
        id: push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      # ARTIFACT ATTESTATION
      - name: Generate artifact attestation
        uses: actions/attest@v4
        with:
          subject-name: index.docker.io/${{ secrets.DOCKER_USERNAME }}/${{ matrix.image}}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true
