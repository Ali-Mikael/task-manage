name: Task management app CI


on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up node
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      # Linting
      - name: Check code backend
        working-directory: ../../backend
        run: npm run lint

      - name: Check code frontend
        working-directory: ../../frontend
        run: npm run lint

      # Run tests
      - name: Run tests on backend
        working-directory: ../../backend
        run: npm test

      - name: Run tests on frontend
        working-directory: ../../frontend
        run: npm test
